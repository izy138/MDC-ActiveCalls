<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miami-Dade Fire Rescue — Live Dispatch Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    :root {
      --bg:        #080c10;
      --surface:   #0d1219;
      --border:    #1a2535;
      --accent:    #e8320a;
      --accent2:   #ff6b35;
      --amber:     #ffaa00;
      --green:     #00e676;
      --blue:      #29b6f6;
      --text:      #c8d8e8;
      --muted:     #4a6080;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow Condensed', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      flex-shrink: 0;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      position: relative;
    }

    .logo-icon svg { width: 36px; height: 36px; }

    h1 {
      font-family: var(--sans);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
    }

    h1 span {
      display: block;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .pulse-dot.error { background: var(--accent); animation: none; }
    .pulse-dot.loading { background: var(--amber); }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,230,118,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(0,230,118,0); }
    }

    #last-update {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    #total-count {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent2);
      font-weight: bold;
    }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 320px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-toolbar {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--border);
      color: var(--text);
      border-color: var(--muted);
    }

    .filter-btn[data-type="FIRE STRUCTURE"].active,
    .filter-btn[data-type="FIRE STRUCTURE"]:hover { color: var(--accent); border-color: var(--accent); }
    .filter-btn[data-type="MEDICAL"].active,
    .filter-btn[data-type="MEDICAL"]:hover { color: var(--blue); border-color: var(--blue); }
    .filter-btn[data-type="TRAFFIC ACCIDENT"].active,
    .filter-btn[data-type="TRAFFIC ACCIDENT"]:hover { color: var(--amber); border-color: var(--amber); }
    .filter-btn[data-type="ALL"].active { color: var(--green); border-color: var(--green); }

    #call-list {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .zone-header {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 4px;
      background: var(--bg);
      position: sticky;
      top: 0;
    }

    .call-card {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(26,37,53,0.6);
      cursor: pointer;
      transition: background 0.15s;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
      align-items: start;
    }

    .call-card:hover, .call-card.active {
      background: rgba(232,50,10,0.06);
      border-left: 2px solid var(--accent2);
      padding-left: 12px;
    }

    .call-type {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .call-type.fire { color: var(--accent); }
    .call-type.medical { color: var(--blue); }
    .call-type.traffic { color: var(--amber); }
    .call-type.other { color: var(--text); }

    .call-address {
      font-size: 12px;
      color: var(--text);
      margin-top: 2px;
      line-height: 1.3;
    }

    .call-units {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    .call-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    .call-fc {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent2);
      text-align: right;
    }

    .no-coords {
      opacity: 0.4;
      cursor: default;
    }
    .no-coords:hover { background: transparent; border-left: none; padding-left: 14px; }

    /* ── Map ── */
    #map {
      flex: 1;
      position: relative;
    }

    #map-container {
      width: 100%;
      height: 100%;
    }

    .custom-marker { background: none !important; border: none !important; }
    .leaflet-zoom-animated { transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
    .leaflet-popup-content { margin: 12px 14px; min-width: 180px; }
    .leaflet-popup-tip { background: var(--surface); }

    .map-overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .map-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .map-btn:hover, .map-btn.active {
      background: var(--border);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── Legend ── */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(13,18,25,0.92);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .legend-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Loading overlay ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8,12,16,0.85);
      z-index: 999;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.1em;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Info window override ── */
    .gm-style .gm-style-iw-c {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      padding: 0 !important;
    }

    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style .gm-style-iw-tc::after { background: var(--surface) !important; }

    .info-window {
      padding: 12px 14px;
      min-width: 220px;
    }

    .iw-type {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .iw-address {
      font-family: var(--sans);
      font-size: 13px;
      color: #a0b8c8;
      margin-bottom: 6px;
    }

    .iw-row {
      display: flex;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #4a6080;
      margin-bottom: 3px;
    }

    .iw-row span:last-child { color: #c8d8e8; }
  </style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" stroke="#e8320a" stroke-width="1.5"/>
        <path d="M18 6 C18 6 12 13 12 18 C12 21.3 14.7 24 18 24 C21.3 24 24 21.3 24 18 C24 13 18 6 18 6Z" fill="#e8320a" opacity="0.9"/>
        <path d="M15 19 C15 17 16.5 15.5 18 14 C18 14 14 17 14 20 C14 22.2 15.8 24 18 24 C16 23 15 21.2 15 19Z" fill="#ff6b35"/>
        <path d="M18 20 C18 18.5 19 17.5 20 16.5 C20 18 19.5 19.5 18 20Z" fill="#ffaa00"/>
      </svg>
    </div>
    <div>
      <h1>Miami-Dade Fire Rescue <span>Live Dispatch — Active Calls</span></h1>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="pulse-dot" id="status-dot"></div>
      <span id="status-text">LIVE</span>
    </div>
    <div id="total-count">— CALLS</div>
    <div id="last-update">—</div>
  </div>
</header>

<div class="main">
  <div id="sidebar">
    <div class="sidebar-toolbar">
      <button class="filter-btn active" data-type="ALL">All</button>
      <button class="filter-btn" data-type="MEDICAL">Medical</button>
      <button class="filter-btn" data-type="FIRE STRUCTURE">Fire</button>
      <button class="filter-btn" data-type="TRAFFIC ACCIDENT">Traffic</button>
    </div>
    <div id="call-list"></div>
  </div>

  <div id="map">
    <div id="loading">
      <div class="spinner"></div>
      <span>LOADING DISPATCH DATA</span>
    </div>
    <div id="map-container"></div>

    <div class="legend">
      <div class="legend-title">Incident Type</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8320a"></div> Fire / Structure</div>
      <div class="legend-item"><div class="legend-dot" style="background:#29b6f6"></div> Medical</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffaa00"></div> Traffic Accident</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a0b8c8"></div> Other</div>
    </div>

    <div class="map-overlay">
      <button class="map-btn" id="refresh-btn">↻ Refresh</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  const BACKEND_URL = window.BACKEND_URL || 'http://localhost:3001';
  const REFRESH_INTERVAL = 60000;

  // Map bounds: [south, west], [north, east]. Edit these four numbers only.
  const MAP_SOUTH = 25.36; //increase to zoom
  const MAP_NORTH = 25.95; //decrease to zoom
  const MAP_WEST = -80.45;
  const MAP_EAST = -80.05;
  const MAP_BOUNDS = L.latLngBounds([MAP_SOUTH, MAP_WEST], [MAP_NORTH, MAP_EAST]);
  const MAP_ZOOM_MIN = 10.25;  // most zoomed out (user can't go further out)
  const MAP_ZOOM_MAX = 14;  // most zoomed in (user can't go further in)

  let map;
  let markers = [];
  let allCalls = [];
  let activeFilter = 'ALL';
  let activeCardEl = null;

  function initMap() {
    map = L.map('map-container', {
      center: MAP_BOUNDS.getCenter(),
      zoom: MAP_ZOOM_MIN,
      minZoom: MAP_ZOOM_MIN,
      maxZoom: MAP_ZOOM_MAX,
      maxBounds: MAP_BOUNDS,
      maxBoundsViscosity: 1,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: MAP_ZOOM_MAX,
    }).addTo(map);

    map.setView(MAP_BOUNDS.getCenter(), MAP_ZOOM_MIN);

    document.getElementById('refresh-btn').addEventListener('click', () => fetchCalls(true));
    setupFilters();

    fetchCalls();
    setInterval(fetchCalls, REFRESH_INTERVAL);
  }

  // ── Fetch & render ───────────────────────────────────────────────────────────
  async function fetchCalls(force = false) {
    setStatus('loading');
    try {
      const res = await fetch(`${BACKEND_URL}/api/calls`);
      if (!res.ok) throw new Error('API error');
      const data = await res.json();

      allCalls = data.calls;
      renderCalls(allCalls);

      document.getElementById('total-count').textContent = `${data.total} ACTIVE CALLS`;
      const d = new Date(data.lastUpdated);
      document.getElementById('last-update').textContent =
        `Updated ${d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

      document.getElementById('loading').style.display = 'none';
      setStatus('live');
    } catch (err) {
      console.error('Fetch error:', err);
      setStatus('error');
      document.getElementById('status-text').textContent = 'ERROR';
    }
  }

  function renderCalls(calls) {
    markers.forEach(m => map.removeLayer(m.marker));
    markers = [];

    const filtered = activeFilter === 'ALL'
      ? calls
      : calls.filter(c => c.incType.toUpperCase().includes(activeFilter));

    renderSidebar(filtered);

    filtered.forEach(call => {
      if (!call.coords) return;

      const color = getColor(call.incType);
      const size = call.incType.toLowerCase().includes('fire') ? 14 : 10;
      const icon = L.divIcon({
        className: 'custom-marker',
        html: `<span style="background:${color};width:${size}px;height:${size}px;border:1.5px solid #fff;border-radius:50%;display:block;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></span>`,
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
      });

      const marker = L.marker([call.coords.lat, call.coords.lng], { icon }).addTo(map);
      marker.bindPopup(buildPopupContent(call), { className: 'custom-popup' });
      marker.on('click', () => marker.openPopup());
      markers.push({ marker, call });
    });
  }

  function buildPopupContent(call) {
    const color = getColor(call.incType);
    return `
      <div class="info-window">
        <div class="iw-type" style="color:${color}">${call.incType}</div>
        <div class="iw-address">${call.address}</div>
        ${call.fc ? `<div class="iw-row"><span>CODE</span><span>${call.fc}</span></div>` : ''}
        <div class="iw-row"><span>RECEIVED</span><span>${call.rcvd}</span></div>
        <div class="iw-row"><span>ZONE</span><span>${call.zone}</span></div>
        <div class="iw-row"><span>UNITS</span><span>${call.units || '—'}</span></div>
      </div>
    `;
  }

  function openPopupForCall(call) {
    const entry = markers.find(m => m.call.id === call.id);
    if (entry) entry.marker.openPopup();
  }

  function renderSidebar(calls) {
    const list = document.getElementById('call-list');
    list.innerHTML = '';

    const byZone = {};
    calls.forEach(c => {
      if (!byZone[c.zone]) byZone[c.zone] = [];
      byZone[c.zone].push(c);
    });

    const zoneOrder = ['NORTH', 'CENTRAL', 'SOUTH', 'EAST', 'MEDCOM', 'UNKNOWN'];
    zoneOrder.forEach(zone => {
      if (!byZone[zone]) return;
      const header = document.createElement('div');
      header.className = 'zone-header';
      header.textContent = `${zone} — ${byZone[zone].length} Call${byZone[zone].length !== 1 ? 's' : ''}`;
      list.appendChild(header);

      byZone[zone].forEach(call => {
        const card = document.createElement('div');
        card.className = `call-card${!call.coords ? ' no-coords' : ''}`;
        card.dataset.id = call.id;

        const typeClass = call.incType.toLowerCase().includes('fire') ? 'fire'
          : call.incType.toLowerCase().includes('medical') ? 'medical'
          : call.incType.toLowerCase().includes('traffic') ? 'traffic'
          : 'other';

        card.innerHTML = `
          <div>
            <div class="call-type ${typeClass}">${call.incType}</div>
            <div class="call-address">${call.address}</div>
            <div class="call-units">${call.units || '—'}</div>
          </div>
          <div>
            <div class="call-time">${call.rcvd}</div>
            ${call.fc ? `<div class="call-fc">${call.fc}</div>` : ''}
          </div>
        `;

        if (call.coords) {
          card.addEventListener('click', () => {
            map.setView([call.coords.lat, call.coords.lng], 15);
            openPopupForCall(call);
            setActiveCard(card);
          });
        }

        list.appendChild(card);
      });
    });
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function getColor(incType) {
    const t = incType.toLowerCase();
    if (t.includes('fire')) return '#e8320a';
    if (t.includes('medical') || t.includes('trauma')) return '#29b6f6';
    if (t.includes('traffic') || t.includes('accident')) return '#ffaa00';
    return '#a0b8c8';
  }

  function setStatus(state) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = 'pulse-dot ' + (state === 'error' ? 'error' : state === 'loading' ? 'loading' : '');
    txt.textContent = state === 'error' ? 'ERROR' : state === 'loading' ? 'UPDATING' : 'LIVE';
  }

  function setActiveCard(el) {
    if (activeCardEl) activeCardEl.classList.remove('active');
    activeCardEl = el;
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.type;
        renderCalls(allCalls);
      });
    });
  }

  document.addEventListener('DOMContentLoaded', initMap);
</script>

</body>
</html>
